services:
  postgres:
    image: postgres:16-alpine
    container_name: whatnow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: whatnow_user
      POSTGRES_PASSWORD: whatnow_password
      POSTGRES_DB: whatnow_db
    ports:
      - "127.0.0.1:5435:5432"
    volumes:
      - whatnow_postgres_data:/var/lib/postgresql/data

volumes:
  whatnow_postgres_data:
